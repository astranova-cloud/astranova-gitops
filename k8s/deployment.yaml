apiVersion: apps/v1
kind: Deployment
metadata:
  name: astranova-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: astranova-app

  template:
    metadata:
      labels:
        app: astranova-app

    spec:
      containers:
      - name: astranova-app
        image: 806889657148.dkr.ecr.us-east-1.amazonaws.com/astranova-app:48
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
