apiVersion: apps/v1
kind: Deployment
metadata:
  name: astranova-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: astranova-app

  template:
    metadata:
      labels:
        app: astranova-app

    spec:
      containers:
        - name: astranova-app
          image: image: 806889657148.dkr.ecr.us-east-1.amazonaws.com/astranova-app:35
          ports:
            - containerPort: 3000
